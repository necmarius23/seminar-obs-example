  <!-- Shadows -->
  <filter id="s" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="b"/>
    <feOffset dx="0" dy="4" in="b" result="o"/>
    <feFlood flood-color="#1A4FA0" flood-opacity="0.09" result="c"/>
    <feComposite in="c" in2="o" operator="in" result="sh"/>
    <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="b"/>
    <feOffset dx="0" dy="8" in="b" result="o"/>
    <feFlood flood-color="#1A4FA0" flood-opacity="0.15" result="c"/>
    <feComposite in="c" in2="o" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Arrow markers -->
  <marker id="a" markerWidth="10" markerHeight="10" refX="8.5" refY="4" orient="auto">
    <path d="M0,0.5 L0,7.5 L9,4z" fill="#1A56DB"/>

    <stop offset="0%" stop-color="#1C5EDE"/>
    <stop offset="100%" stop-color="#2D78F5"/>
  </linearGradient>

  <!-- Blueprint grid inside hero icon -->
  <pattern id="grid" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
    <path d="M7 0H0V7" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.6"/>
  </pattern>

  <!-- Soft radial glow behind hero -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#D5E6FF" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#E8EFF8" stop-opacity="0"/>
